name: k6 Load Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  k6-tests:
    name: Run k6 Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laba3_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot app
        working-directory: backend
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -q

      - name: Start Spring Boot app
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/laba3_db
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
        run: |
          java -jar target/*.jar &
          echo "Waiting for app to start..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/login && break || sleep 3
          done

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz -o /tmp/k6.tar.gz
          tar -xzf /tmp/k6.tar.gz -C /tmp/
          sudo cp /tmp/k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6

      - name: Run Smoke Test
        run: k6 run k6-tests/smoke-test.js --env BASE_URL=http://localhost:8080

      - name: Run Load Test
        run: k6 run k6-tests/load-test.js --env BASE_URL=http://localhost:8080

      - name: Run Stress Test
        run: k6 run k6-tests/stress-test.js --env BASE_URL=http://localhost:8080