name: k6 Load Tests

on:
  push:
    branches: [ main ]

jobs:
  k6-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -sL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz -o k6.tar.gz
          tar -xzf k6.tar.gz
          sudo cp k6-v0.54.0-linux-amd64/k6 /usr/local/bin/

      - name: Run Smoke Test
        run: k6 run k6-tests/smoke-test.js --env BASE_URL=http://localhost:8080

      - name: Run Load Test
        run: k6 run k6-tests/load-test.js --env BASE_URL=http://localhost:8080

      - name: Run Stress Test
        run: k6 run k6-tests/stress-test.js --env BASE_URL=http://localhost:8080